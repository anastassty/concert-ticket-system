{% extends "base.html" %}
{% block title %}Add Artist{% endblock %}
{% block content %}

<h1>Add Artist</h1>

<form method="POST">
    <label>Artist Name:</label>
    <input type="text" name="artist_name" required><br><br>

    <label>Genre:</label>
    <input type="text" name="genre" required><br><br>

    <button type="submit">Add Artist</button>
</form>

{% if message %}
    <p style="color: #a855f7;">{{message}}</p>
{% endif %}

{% endblock %}
