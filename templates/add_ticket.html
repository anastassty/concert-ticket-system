{% extends "base.html" %}
{% block title %}Add Ticket{% endblock %}
{% block content %}

<h1>Add Ticket</h1>

<form method="POST">
    <label>Concert:</label>
    <select name="concert_id">
        {% for concert in concerts %}
        <option value="{{concert[0]}}">{{concert[4]}} - {{concert[2]}} ({{concert[3]}})</option>
        {% endfor %}
    </select><br><br>

    <label>Customer:</label>
    <select name="customer_id">
        {% for customer in customers %}
        <option value="{{customer[0]}}">{{customer[1]}} - Customer ID: {{customer[0]}}</option>
        {% endfor %}
    </select><br><br>

    <label>Seat Number:</label>
    <input type="text" name="seat_number" required><br><br>

    <label>Price (USD):</label>
    <input type="number" step="0.01" name="price" min="0" required><br><br>

    <button type="submit">Add Ticket</button>
</form>

{% if message %}
    <p style="color: #a855f7;">{{message}}</p>
{% endif %}

{% endblock %}
