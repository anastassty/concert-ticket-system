{% extends "base.html" %}
{% block title %}Add Concert{% endblock %}
{% block content %}

<h1>Add Concert</h1>

<form method="POST">
    <label>Venue Name:</label>
    <input type="text" name="venue_name" required><br><br>

    <label>City:</label>
    <input type="text" name="city" required><br><br>

    <label>Concert Date:</label>
    <input type="date" name="concert_date" required><br><br>

    <label>Artist:</label>
    <select name="artist_id">
        {% for artist in artists %}
        <option value="{{artist[0]}}">{{artist[1]}}</option>
        {% endfor %}
    </select><br><br>

    <button type="submit">Add Concert</button>
</form>

{% if message %}
    <p style="color: #a855f7;">{{message}}</p>
{% endif %}

{% endblock %}
