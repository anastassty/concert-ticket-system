{% extends "base.html" %}
{% block title %}Add Customer{% endblock %}
{% block content %}

<h1>Add Customer</h1>

<form method="POST">
    <label>Customer Name:</label>
    <input type="text" name="customer_name" required><br><br>

    <button type="submit">Add Customer</button>
</form>

{% if message %}
    <p style="color: #a855f7;">{{message}}</p>
{% endif %}

{% endblock %}
