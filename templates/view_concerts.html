{% extends "base.html" %}
{% block title %}Concerts{% endblock %}
{% block content %}

<h1>View Concerts</h1>

<form method="POST">
    <label>City:</label>
    <select name="city">
        <option value="all"> All cities</option>
        {% for city in cities %}
        <option value="{{city}}"> {{city}} </option>
        {% endfor %}
    </select>
    <button type="submit">Search</button>
</form>

<br>
<hr>
<br>

{% if rows %}
    <table border="1" cellpadding="8">
        <tr>
            <th>Concert ID</th>
            <th>Venue Name</th>
            <th>City</th>
            <th>Concert Date</th>
            <th>Artist</th>
        </tr>

        {% for row in rows %}
        <tr>
            <td>{{row[0]}}</td>
            <td>{{row[1]}}</td>
            <td>{{row[2]}}</td>
            <td>{{row[3]}}</td>
            <td>{{row[4]}}</td>
        </tr>
        {% endfor %}
    </table>
{% endif %}

{% endblock %}
